# .github/dependabot.yml
version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    reviewers:
      - "team:mobile-developers"
      - "team:backend-developers"
    groups:
      gradle-patch:
        patterns: ["*"]
        update-types: ["patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/London"
    reviewers:
      - "team:mobile-developers"
      - "team:backend-developers"
    groups:
      actions-all:
        patterns: ["*"]
        update-types: ["major", "minor", "patch"]
